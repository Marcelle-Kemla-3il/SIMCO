services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: simco
      POSTGRES_USER: simco
      POSTGRES_PASSWORD: simco_password
    ports:
      - "5432:5432"
    volumes:
      - simco_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simco -d simco"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://simco:simco_password@db:5432/simco
      LLM_PROVIDER: mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_API_URL: ${MISTRAL_API_URL}
      MISTRAL_MODEL: ${MISTRAL_MODEL}
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ./quiz-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  simco_db_data:
